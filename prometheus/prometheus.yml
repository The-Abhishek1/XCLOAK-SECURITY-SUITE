global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  # host.docker.internal resolves via extra_hosts: host-gateway in docker-compose
  - job_name: 'xcloak-backend'
    static_configs:
      - targets: ['192.168.7.4:8080']
    metrics_path: /metrics
    scrape_interval: 15s
    authorization:
      credentials_file: /etc/prometheus/metrics_token

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
