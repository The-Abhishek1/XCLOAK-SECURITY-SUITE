# Demo deployment — suite.xcloak.tech
#
# Single-command VPS setup:
#   cp .env.demo.example .env.demo
#   # edit .env.demo with your secrets
#   docker compose -f docker-compose.demo.yml --env-file .env.demo up -d --build
#
# What runs here:
#   ✅ PostgreSQL  (demo DB, isolated from any production data)
#   ✅ Redis       (sessions, rate-limiting)
#   ✅ Backend     (DEMO_ONLY=true — blocks real login/register, auto-serves demo JWT)
#   ✅ Frontend    (NEXT_PUBLIC_DEMO_ONLY=true — shows only "Try Demo", no login form)
#   ✅ Demo seeder (one-shot: seeds demo tenant 9999 with realistic threat data)
#   ✅ Prometheus  (scrapes backend metrics)
#   ✅ Grafana     (dashboards, shows real observability data to demo visitors)
#   ❌ Kafka/Zookeeper — disabled (KAFKA_ENABLED=false), saves ~700 MB RAM
#   ❌ MinIO       — not needed for demo
#   ❌ PgBouncer   — not needed (single demo tenant, low concurrency)
#   ❌ Vault       — not needed (demo secrets in env vars)
#
# Nginx / SSL:
#   Point suite.xcloak.tech at your VPS IP.
#   Frontend  → proxy to http://localhost:3000
#   /api/*    → proxy to http://localhost:8080
#   Grafana   → proxy to http://localhost:3001  (optional, nice to expose)
#   Use Caddy or certbot for HTTPS — see scripts/demo-caddy.txt

services:

  # ── Infrastructure ────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: xcloak-demo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-xcloak}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-xcloak_demo}
      POSTGRES_DB:       ${DB_NAME:-xcloak_demo}
    volumes:
      - demo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-xcloak} -d ${DB_NAME:-xcloak_demo}"]
      interval: 5s
      timeout: 5s
      retries: 12
    deploy:
      resources:
        limits:
          memory: 256m

  redis:
    image: redis:7-alpine
    container_name: xcloak-demo-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 64m

  # ── Application ───────────────────────────────────────────────

  backend:
    build:
      context: ./xcloak-platform/backend
      dockerfile: Dockerfile
    container_name: xcloak-demo-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database
      DB_HOST:     postgres
      DB_PORT:     "5432"
      DB_USER:     ${DB_USER:-xcloak}
      DB_PASSWORD: ${DB_PASSWORD:-xcloak_demo}
      DB_NAME:     ${DB_NAME:-xcloak_demo}
      # Auth
      JWT_SECRET:  ${JWT_SECRET}
      # Demo mode — blocks real login/register, serves only demo JWTs
      DEMO_ONLY:   "true"
      # Services disabled in demo
      KAFKA_ENABLED: "false"
      MINIO_ENABLED: "false"
      # CORS: allow the demo frontend domain
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://suite.xcloak.tech,http://localhost:3000}
      # Redis
      REDIS_ADDR: redis:6379
      # Metrics scrape token (Prometheus)
      METRICS_TOKEN: ${METRICS_TOKEN:-demo-metrics-token}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256m

  demo-seeder:
    build:
      context: ./xcloak-platform/backend
      dockerfile: Dockerfile.seed.demo
    container_name: xcloak-demo-seeder
    restart: "no"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      DB_HOST:     postgres
      DB_PORT:     "5432"
      DB_USER:     ${DB_USER:-xcloak}
      DB_PASSWORD: ${DB_PASSWORD:-xcloak_demo}
      DB_NAME:     ${DB_NAME:-xcloak_demo}
    deploy:
      resources:
        limits:
          memory: 64m

  frontend:
    build:
      context: ./xcloak-platform/frontend
      dockerfile: Dockerfile
      args:
        # Baked at build time — hides login/register form, shows only "Try Demo"
        NEXT_PUBLIC_DEMO_ONLY: "true"
    container_name: xcloak-demo-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_INTERNAL_URL: http://backend:8080
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          memory: 512m

  # ── Observability ─────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: xcloak-demo-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.demo.yml:/etc/prometheus/prometheus.yml:ro
      - demo_prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128m

  grafana:
    image: grafana/grafana:11.0.0
    container_name: xcloak-demo-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-xcloak-demo}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_AUTH_ANONYMOUS_ENABLED:  "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/xcloak-overview.json
    volumes:
      - demo_grafana_data:/var/lib/grafana
      - ./grafana/provisioning-demo:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    deploy:
      resources:
        limits:
          memory: 192m

volumes:
  demo_postgres_data:
  demo_prometheus_data:
  demo_grafana_data:
