name: xcloak_agent
description: XCloak Mobile Security Agent
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client
  http: ^1.2.2

  # Secure credential storage (Keystore on Android, Keychain on iOS)
  flutter_secure_storage: ^9.2.2

  # General config / state
  shared_preferences: ^2.3.2

  # Device hardware info (model, OS version, Android ID)
  device_info_plus: ^10.1.2

  # Package / app version
  package_info_plus: ^8.1.1

  # Background foreground service (persists across app close)
  flutter_background_service: ^5.0.5

  # Connectivity state
  connectivity_plus: ^6.0.3

  # Runtime permissions
  permission_handler: ^11.3.1

  # Installed app list (needs QUERY_ALL_PACKAGES in manifest)
  installed_apps: ^1.4.0

  # UUID for device fingerprint salt
  uuid: ^4.5.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
