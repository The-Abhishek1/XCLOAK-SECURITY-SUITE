{{- if .Values.pgbouncer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "xcloak.fullname" . }}-pgbouncer
  labels:
    {{- include "xcloak.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgbouncer
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "xcloak.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: pgbouncer
  template:
    metadata:
      labels:
        {{- include "xcloak.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: pgbouncer
    spec:
      containers:
        - name: pgbouncer
          image: "{{ .Values.pgbouncer.image.repository }}:{{ .Values.pgbouncer.image.tag }}"
          imagePullPolicy: {{ .Values.pgbouncer.image.pullPolicy }}
          ports:
            - name: pgbouncer
              containerPort: 6432
              protocol: TCP
          env:
            {{- if .Values.postgresql.enabled }}
            - name: POSTGRESQL_HOST
              value: {{ include "xcloak.fullname" . }}-postgresql
            - name: POSTGRESQL_DATABASE
              value: {{ .Values.postgresql.auth.database | quote }}
            - name: POSTGRESQL_USERNAME
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "xcloak.fullname" . }}-postgresql
                  key: password
            {{- else }}
            - name: POSTGRESQL_HOST
              value: {{ .Values.postgresqlExternal.host | quote }}
            - name: POSTGRESQL_DATABASE
              value: {{ .Values.postgresqlExternal.database | quote }}
            - name: POSTGRESQL_USERNAME
              value: {{ .Values.postgresqlExternal.username | quote }}
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresqlExternal.existingSecret | quote }}
                  key: password
            {{- end }}
            - name: POSTGRESQL_PORT
              value: "5432"
            - name: PGBOUNCER_POOL_MODE
              value: {{ .Values.pgbouncer.pool.mode | quote }}
            - name: PGBOUNCER_MAX_CLIENT_CONN
              value: {{ .Values.pgbouncer.pool.maxClientConn | quote }}
            - name: PGBOUNCER_DEFAULT_POOL_SIZE
              value: {{ .Values.pgbouncer.pool.defaultPoolSize | quote }}
            - name: PGBOUNCER_MIN_POOL_SIZE
              value: {{ .Values.pgbouncer.pool.minPoolSize | quote }}
            - name: PGBOUNCER_RESERVE_POOL_SIZE
              value: {{ .Values.pgbouncer.pool.reservePoolSize | quote }}
            - name: PGBOUNCER_QUERY_WAIT_TIMEOUT
              value: {{ .Values.pgbouncer.pool.queryWaitTimeout | quote }}
            - name: PGBOUNCER_SERVER_IDLE_TIMEOUT
              value: {{ .Values.pgbouncer.pool.serverIdleTimeout | quote }}
            - name: PGBOUNCER_AUTH_TYPE
              value: md5
            - name: PGBOUNCER_LOG_CONNECTIONS
              value: "0"
            - name: PGBOUNCER_LOG_DISCONNECTIONS
              value: "0"
          livenessProbe:
            tcpSocket:
              port: 6432
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 6432
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.pgbouncer.resources | nindent 12 }}
{{- end }}
