{{- if not .Values.backend.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "xcloak.backend.fullname" . }}
  labels:
    {{- include "xcloak.backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.backend.secrets.jwtSecret | default (include "xcloak.preservedSecretValue" (list (include "xcloak.backend.fullname" .) "JWT_SECRET" .)) | quote }}
  METRICS_TOKEN: {{ .Values.backend.secrets.metricsToken | default (include "xcloak.preservedSecretValue" (list (include "xcloak.backend.fullname" .) "METRICS_TOKEN" .)) | quote }}
  {{- if .Values.backend.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.backend.secrets.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.backend.secrets.smtpPass }}
  SMTP_PASS: {{ .Values.backend.secrets.smtpPass | quote }}
  {{- end }}
  {{- if not .Values.postgresql.enabled }}
  DB_PASSWORD: {{ .Values.backend.secrets.dbPassword | quote }}
  {{- end }}
{{- end }}
