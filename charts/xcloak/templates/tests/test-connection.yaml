apiVersion: v1
kind: Pod
metadata:
  name: {{ include "xcloak.fullname" . }}-test-connection
  labels:
    {{- include "xcloak.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: backend-health
      image: curlimages/curl:8.10.1
      command:
        - sh
        - -c
        - curl -sf http://{{ include "xcloak.backend.fullname" . }}:{{ .Values.backend.service.port }}/api/health
    - name: frontend-health
      image: curlimages/curl:8.10.1
      command:
        - sh
        - -c
        - curl -sf http://{{ include "xcloak.frontend.fullname" . }}:{{ .Values.frontend.service.port }}/login
