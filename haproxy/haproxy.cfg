global
    maxconn 2000
    log     stdout local0

defaults
    log     global
    mode    tcp
    retries 3
    timeout client  30m
    timeout connect 4s
    timeout server  30m
    timeout check   5s
    option  tcp-check

# HAProxy stats dashboard — http://haproxy:7000
listen stats
    mode http
    bind *:7000
    stats enable
    stats uri /
    stats refresh 10s
    stats show-legends

# ─── Write endpoint (port 5000) ─────────────────────────────────────────────
# Routes to whichever Patroni node is currently the primary.
# Patroni exposes GET /primary — returns 200 on the leader, 503 on standby.
frontend pg_write
    bind *:5000
    default_backend pg_primary

backend pg_primary
    option  httpchk GET /primary
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server patroni-primary patroni-primary:5432 maxconn 900 check port 8008
    server patroni-replica patroni-replica:5432 maxconn 900 check port 8008

# ─── Read endpoint (port 5001) ───────────────────────────────────────────────
# Routes to standbys first; falls back to primary if no replica is healthy.
# Patroni exposes GET /replica?lag=<bytes> — returns 200 only on healthy standbys.
frontend pg_read
    bind *:5001
    default_backend pg_replicas

backend pg_replicas
    option  httpchk GET /replica?lag=33554432
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server patroni-replica patroni-replica:5432 maxconn 900 check port 8008
    # Primary as read fallback — marked `backup` so it's only used when the
    # replica is down. Remove the `backup` flag to load-balance across both.
    server patroni-primary patroni-primary:5432 maxconn 900 check port 8008 backup
