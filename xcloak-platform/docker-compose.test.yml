version: "3.9"

# Lightweight test environment — Postgres + Redis only.
# Start with:  docker compose -f docker-compose.test.yml up -d
# Run tests:   TEST_DB_URL="postgres://xcloak:testpassword@localhost:5433/xcloak_test?sslmode=disable" \
#              TEST_REDIS_URL="redis://localhost:6380" \
#              go test ./... -tags integration
# Tear down:   docker compose -f docker-compose.test.yml down -v

services:
  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: xcloak_test
      POSTGRES_USER: xcloak
      POSTGRES_PASSWORD: testpassword
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xcloak -d xcloak_test"]
      interval: 2s
      timeout: 5s
      retries: 15

  redis_test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10
