# Minimal dev stack — Postgres only (~256 MB)
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#
# Redis is intentionally excluded — the system Redis on localhost:6379
# is used directly (avoids port conflict and saves ~96 MB).
#
# What you get vs. the full stack:
#   ✅ Postgres   — required (all data lives here)
#   ✅ Redis      — use system Redis (already running on localhost:6379)
#   ❌ Kafka      — set KAFKA_ENABLED=false in .env (graceful no-op)
#   ❌ Zookeeper  — not needed without Kafka
#   ❌ Kafka UI   — not needed without Kafka
#   ❌ MinIO      — audit export silently disabled; everything else works
#   ❌ Prometheus — metrics endpoint still works, just nobody scrapes it
#   ❌ Grafana    — dashboards unavailable; all app features still work

services:

  postgres:
    image: postgres:16-alpine
    container_name: xcloak-postgres-dev
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: xcloak
      POSTGRES_PASSWORD: ${DB_PASSWORD:-xcloak}
      POSTGRES_DB: ngfw
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256m

volumes:
  postgres_dev_data:
