name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Check the [roadmap](../../roadmap.md) first — your idea may already be planned.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Detection (Sigma/YARA/IOC/behavioral)
        - SOAR / Playbooks / Response
        - Go Agent collector
        - Mobile Agent (Android/iOS)
        - MDM
        - Integrations (Slack/Jira/etc.)
        - Compliance / Reporting
        - API / Developer experience
        - Helm / Kubernetes
        - Docs / Examples
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem you're solving
      description: What is the use case? What can't you do today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like. Include API shape, UI mockup, or config format if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways you've worked around this, or other tools you've considered.

  - type: checkboxes
    id: contribution
    attributes:
      label: Would you be willing to contribute this?
      options:
        - label: Yes, I'd like to open a PR for this
        - label: I can help with testing
        - label: I can help with documentation only
