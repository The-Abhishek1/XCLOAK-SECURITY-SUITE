name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write
  packages: write

jobs:
  # Build all release artifacts first
  build-artifacts:
    name: Build release artifacts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: xcloak-agent/go.mod

      - name: Build agent binaries
        working-directory: xcloak-agent
        run: |
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-X xcloak-agent/agent.Version=${VERSION}"

          # Linux amd64 (native — CGO available for eBPF)
          GOOS=linux  GOARCH=amd64 go build -ldflags "$LDFLAGS" \
            -o xcloak-agent-linux-amd64 ./main.go

          # Linux arm64 (cross-compile — CGO disabled, eBPF stub active)
          CGO_ENABLED=0 GOOS=linux  GOARCH=arm64 go build -ldflags "$LDFLAGS" \
            -o xcloak-agent-linux-arm64 ./main.go

          # Windows amd64 (cross-compile — CGO disabled)
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" \
            -o xcloak-agent-windows-amd64.exe ./main.go

          # Checksums
          sha256sum xcloak-agent-linux-amd64 \
                    xcloak-agent-linux-arm64 \
                    xcloak-agent-windows-amd64.exe > SHA256SUMS.txt

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Android APK
        working-directory: xcloak-agent-mobile
        run: |
          flutter pub get
          flutter build apk --release --no-pub

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Package Helm chart
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm dependency update charts/xcloak
          helm package charts/xcloak --destination .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            xcloak-agent/xcloak-agent-linux-amd64
            xcloak-agent/xcloak-agent-linux-arm64
            xcloak-agent/xcloak-agent-windows-amd64.exe
            xcloak-agent/SHA256SUMS.txt
            xcloak-agent-mobile/build/app/outputs/flutter-apk/app-release.apk
            xcloak-*.tgz
          body: |
            ## XCloak ${{ github.ref_name }}

            See [CHANGELOG.md](https://github.com/The-Abhishek1/XCLOAK-SECURITY-SUITE/blob/main/CHANGELOG.md) for full details.

            ### Quick install (Go agent)

            ```bash
            # Linux
            curl -Lo xcloak-agent https://github.com/The-Abhishek1/XCLOAK-SECURITY-SUITE/releases/download/${{ github.ref_name }}/xcloak-agent-linux-amd64
            chmod +x xcloak-agent && ./xcloak-agent

            # Windows — download xcloak-agent-windows-amd64.exe and run it
            ```

            ### Helm

            ```bash
            helm install xcloak ./xcloak-*.tgz \
              --set global.ingress.host=xcloak.yourdomain.com \
              --set backend.env.JWT_SECRET=$(openssl rand -hex 32)
            ```

            ### SHA-256 checksums

            See `SHA256SUMS.txt` attached to this release.
