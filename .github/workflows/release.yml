name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write
  packages: write

jobs:
  # Build all release artifacts first
  build-artifacts:
    name: Build release artifacts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: xcloak-agent-desktop/go.mod

      - name: Build agent binaries
        working-directory: xcloak-agent-desktop
        run: |
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-X xcloak-agent-desktop/agent.Version=${VERSION}"

          # Linux amd64 (native — CGO available for eBPF)
          GOOS=linux  GOARCH=amd64 go build -ldflags "$LDFLAGS" \
            -o xcloak-agent-linux-amd64 ./main.go

          # Linux arm64 (cross-compile — CGO disabled, eBPF stub active)
          CGO_ENABLED=0 GOOS=linux  GOARCH=arm64 go build -ldflags "$LDFLAGS" \
            -o xcloak-agent-linux-arm64 ./main.go

          # Windows amd64 (cross-compile — CGO disabled)
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" \
            -o xcloak-agent-windows-amd64.exe ./main.go

          # Checksums
          sha256sum xcloak-agent-linux-amd64 \
                    xcloak-agent-linux-arm64 \
                    xcloak-agent-windows-amd64.exe > SHA256SUMS.txt

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Android APK
        working-directory: xcloak-agent-mobile
        run: |
          flutter pub get
          flutter build apk --release --no-pub

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Package Helm chart
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm dependency update charts/xcloak
          helm package charts/xcloak --destination .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            xcloak-agent-desktop/xcloak-agent-linux-amd64
            xcloak-agent-desktop/xcloak-agent-linux-arm64
            xcloak-agent-desktop/xcloak-agent-windows-amd64.exe
            xcloak-agent-desktop/SHA256SUMS.txt
            xcloak-agent-mobile/build/app/outputs/flutter-apk/app-release.apk
            xcloak-*.tgz
          body: |
            ## XCloak ${{ github.ref_name }}

            See [CHANGELOG.md](https://github.com/The-Abhishek1/XCLOAK-SECURITY-SUITE/blob/main/CHANGELOG.md) for full details.

            ---

            ### Docker images

            ```bash
            docker pull ghcr.io/the-abhishek1/xcloak-backend:${{ github.ref_name }}
            docker pull ghcr.io/the-abhishek1/xcloak-frontend:${{ github.ref_name }}
            docker pull ghcr.io/the-abhishek1/xcloak-agent-desktop:${{ github.ref_name }}
            ```

            > The agent container requires elevated privileges for eBPF:
            > `docker run --privileged ghcr.io/the-abhishek1/xcloak-agent-desktop:${{ github.ref_name }}`

            ---

            ### Go agent — binary install

            ```bash
            # Linux (amd64)
            curl -Lo xcloak-agent-desktop https://github.com/The-Abhishek1/XCLOAK-SECURITY-SUITE/releases/download/${{ github.ref_name }}/xcloak-agent-linux-amd64
            chmod +x xcloak-agent-desktop && sudo ./xcloak-agent-desktop

            # Linux (arm64)
            curl -Lo xcloak-agent-desktop https://github.com/The-Abhishek1/XCLOAK-SECURITY-SUITE/releases/download/${{ github.ref_name }}/xcloak-agent-linux-arm64
            chmod +x xcloak-agent-desktop && sudo ./xcloak-agent-desktop

            # Windows (amd64) — download xcloak-agent-windows-amd64.exe and run as Administrator
            ```

            ---

            ### Mobile agent (Android)

            Download `app-release.apk` from the assets below and sideload it, or distribute via MDM.
            Minimum Android SDK: 21 (Android 5.0).

            ---

            ### Helm — self-hosted deployment

            ```bash
            helm install xcloak ./xcloak-*.tgz \
              --set global.ingress.host=xcloak.yourdomain.com \
              --set backend.env.JWT_SECRET=$(openssl rand -hex 32)
            ```

            ---

            ### Verify checksums

            ```bash
            sha256sum -c SHA256SUMS.txt
            ```

  # ── Publish Helm chart to GitHub Pages (Helm repo) ─────────────────────────
  # After running this once, users can:
  #   helm repo add xcloak https://the-abhishek1.github.io/XCLOAK-SECURITY-SUITE
  #   helm install xcloak xcloak/xcloak --set global.ingress.host=...
  #
  # Prerequisites (one-time setup):
  #   1. GitHub repo Settings → Pages → Source: "Deploy from a branch" → gh-pages
  #   2. Settings → Actions → General → Workflow permissions: Read and write
  publish-helm:
    name: Publish Helm chart to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-artifacts

    permissions:
      contents: write   # push to gh-pages branch

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # chart-releaser needs full history to detect changes

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Add Bitnami repo and update chart dependencies
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update
          helm dependency update charts/xcloak

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
