name: frontend-ci

on:
  push:
    paths:
      - 'xcloak-platform/frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'xcloak-platform/frontend/**'
      - '.github/workflows/frontend-ci.yml'

defaults:
  run:
    working-directory: xcloak-platform/frontend

jobs:
  build-and-check:
    name: Type check, lint, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: xcloak-platform/frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # Upload the Next.js build output so the e2e job can start the server
      # without rebuilding from scratch.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: |
            xcloak-platform/frontend/.next
            xcloak-platform/frontend/public
          include-hidden-files: true   # .next dir starts with a dot — v4 skips it by default
          retention-days: 1

  e2e:
    name: Playwright smoke tests
    runs-on: ubuntu-latest
    needs: build-and-check

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: xcloak-platform/frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: Install Playwright browsers
        # Install only Chromium — that is the only browser used in the
        # playwright.config.ts projects array, so no need for Firefox/WebKit.
        run: npx playwright install --with-deps chromium

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: xcloak-platform/frontend   # LCA stripped by v4; files land as .next/ and public/

      - name: Start Next.js server
        # output: standalone → serve via the standalone Node.js server.
        # All /api/* routes are stubbed in the tests via page.route(), so no
        # live backend is required.
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          PORT=3000 node .next/standalone/server.js &
          # Wait for the server to be ready (up to 60 s)
          for i in $(seq 1 60); do
            curl -sf http://localhost:3000 && break
            sleep 1
          done
          curl -sf http://localhost:3000 || { echo "Server failed to start"; exit 1; }

      - name: Run Playwright tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: xcloak-platform/frontend/playwright-report/
          retention-days: 7
