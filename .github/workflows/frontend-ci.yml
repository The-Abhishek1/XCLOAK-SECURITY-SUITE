name: frontend-ci

on:
  push:
    paths:
      - 'xcloak-ngfw/frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'xcloak-ngfw/frontend/**'
      - '.github/workflows/frontend-ci.yml'

defaults:
  run:
    working-directory: xcloak-ngfw/frontend

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: xcloak-ngfw/frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
