name: agent-ci

on:
  push:
    paths:
      - 'xcloak-agent/**'
      - '.github/workflows/agent-ci.yml'
  pull_request:
    paths:
      - 'xcloak-agent/**'
      - '.github/workflows/agent-ci.yml'

defaults:
  run:
    working-directory: xcloak-agent

jobs:
  # ── Build + test on the native runner ──────────────────────────────────────
  build-and-test:
    name: Build & Test (linux/amd64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: xcloak-agent/go.mod
          cache-dependency-path: xcloak-agent/go.sum

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        # CGO is required by the YARA and eBPF packages on Linux — the runner
        # has gcc so this is fine; use -count=1 to prevent test caching
        # masking failures.
        run: go test -count=1 -race -timeout 60s ./...

  # ── Cross-compile check ────────────────────────────────────────────────────
  # Validates that the agent compiles for every supported platform without
  # running tests (cgo cross-compilers for all targets are not available on
  # the free runners — the native linux build above already exercises tests).
  cross-compile:
    name: Cross-compile (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: build-and-test

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            cgo: "0"            # CGO disabled for Windows cross-compile
          - goos: linux
            goarch: arm64
            cgo: "0"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: xcloak-agent/go.mod
          cache-dependency-path: xcloak-agent/go.sum

      - name: Cross-compile
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          EXT=""
          [[ "$GOOS" == "windows" ]] && EXT=".exe"
          go build \
            -ldflags="-s -w -X main.Version=ci-${GITHUB_SHA::7}" \
            -o /tmp/xcloak-agent-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} \
            .

  # ── Release builds (tags only) ─────────────────────────────────────────────
  # Produces stripped, statically-linked (CGO_ENABLED=0) binaries for every
  # supported platform and attaches them to the GitHub release.
  release:
    name: Release (${{ matrix.goos }}/${{ matrix.goarch }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build-and-test, cross-compile]

    permissions:
      contents: write   # needed to upload release assets

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            cgo: "0"
          - goos: linux
            goarch: arm64
            cgo: "0"
          - goos: windows
            goarch: amd64
            cgo: "0"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: xcloak-agent/go.mod
          cache-dependency-path: xcloak-agent/go.sum

      - name: Build release binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          EXT=""
          [[ "$GOOS" == "windows" ]] && EXT=".exe"
          ARTIFACT="xcloak-agent-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}"
          go build \
            -ldflags="-s -w -X main.Version=${VERSION}" \
            -o "${ARTIFACT}" \
            .
          echo "ARTIFACT=${ARTIFACT}" >> "${GITHUB_ENV}"

      - name: Compute SHA-256
        run: sha256sum "${ARTIFACT}" > "${ARTIFACT}.sha256"

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ARTIFACT }}
            ${{ env.ARTIFACT }}.sha256
