name: agent-ci

on:
  push:
    paths:
      - 'xcloak-agent-desktop/**'
      - '.github/workflows/agent-ci.yml'
  pull_request:
    paths:
      - 'xcloak-agent-desktop/**'
      - '.github/workflows/agent-ci.yml'

defaults:
  run:
    working-directory: xcloak-agent-desktop

jobs:
  # ── Build + test on the native runner ──────────────────────────────────────
  build-and-test:
    name: Build & Test (linux/amd64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: xcloak-agent-desktop/go.mod
          cache-dependency-path: xcloak-agent-desktop/go.sum

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        # CGO is required by the YARA and eBPF packages on Linux — the runner
        # has gcc so this is fine; use -count=1 to prevent test caching
        # masking failures.
        run: go test -count=1 -race -timeout 60s ./...

  # ── Cross-compile check ────────────────────────────────────────────────────
  # Validates that the agent compiles for every supported platform without
  # running tests (cgo cross-compilers for all targets are not available on
  # the free runners — the native linux build above already exercises tests).
  cross-compile:
    name: Cross-compile (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: build-and-test

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            cgo: "0"            # CGO disabled for Windows cross-compile
          - goos: linux
            goarch: arm64
            cgo: "0"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: xcloak-agent-desktop/go.mod
          cache-dependency-path: xcloak-agent-desktop/go.sum

      - name: Cross-compile
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          EXT=""
          [[ "$GOOS" == "windows" ]] && EXT=".exe"
          go build \
            -ldflags="-s -w -X main.Version=ci-${GITHUB_SHA::7}" \
            -o /tmp/xcloak-agent-desktop-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} \
            .

  # Tagged releases (binaries + GitHub Release + Docker images) are handled
  # by .github/workflows/release.yml, not here — this workflow only validates
  # PRs/pushes. A second release job here previously duplicated that work
  # with a different artifact-naming scheme and raced with release.yml on
  # every `v*.*.*` tag push.
