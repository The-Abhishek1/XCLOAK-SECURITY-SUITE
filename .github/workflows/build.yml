name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xcloak-ngfw/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: xcloak-ngfw/backend/go.mod
          cache-dependency-path: xcloak-ngfw/backend/go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -timeout 120s

  # ── Go Agent — Linux ──────────────────────────────────────────────────────
  agent-linux:
    name: Agent (Linux amd64)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xcloak-agent

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: xcloak-agent/go.mod
          cache-dependency-path: xcloak-agent/go.sum

      - name: Build
        run: GOOS=linux GOARCH=amd64 go build -o xcloak-agent-linux-amd64 ./main.go

      - name: Vet
        run: go vet ./...

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xcloak-agent-linux-amd64
          path: xcloak-agent/xcloak-agent-linux-amd64

  # ── Go Agent — Windows ────────────────────────────────────────────────────
  agent-windows:
    name: Agent (Windows amd64)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xcloak-agent

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: xcloak-agent/go.mod
          cache-dependency-path: xcloak-agent/go.sum

      - name: Build (cross-compile)
        run: GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -o xcloak-agent-windows-amd64.exe ./main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xcloak-agent-windows-amd64
          path: xcloak-agent/xcloak-agent-windows-amd64.exe

  # ── Mobile Agent (Flutter / Android) ─────────────────────────────────────
  mobile:
    name: Mobile Agent (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xcloak-agent-mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build APK
        run: flutter build apk --release --no-pub

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xcloak-agent-android
          path: xcloak-agent-mobile/build/app/outputs/flutter-apk/app-release.apk

  # ── Helm chart lint ───────────────────────────────────────────────────────
  helm:
    name: Helm Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Add Bitnami repo
        run: helm repo add bitnami https://charts.bitnami.com/bitnami

      - name: Update dependencies
        run: helm dependency update charts/xcloak

      - name: Lint chart
        run: helm lint charts/xcloak --values charts/xcloak/ci/smoke-values.yaml --strict
