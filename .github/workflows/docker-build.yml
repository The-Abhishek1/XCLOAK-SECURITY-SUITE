name: docker-build

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'xcloak-platform/backend/**'
      - 'xcloak-platform/frontend/**'
      - 'xcloak-agent-desktop/**'
      - '.github/workflows/docker-build.yml'
  pull_request:
    paths:
      - 'xcloak-platform/backend/**'
      - 'xcloak-platform/frontend/**'
      - 'xcloak-agent-desktop/**'
      - '.github/workflows/docker-build.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            context: xcloak-platform/backend
          - name: frontend
            context: xcloak-platform/frontend
          - name: agent
            context: xcloak-agent-desktop

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # git SHA on every build, `latest` only on main, semver on git tags.
      # PRs build (to catch a broken Dockerfile) but never push.
      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/xcloak-${{ matrix.name }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
