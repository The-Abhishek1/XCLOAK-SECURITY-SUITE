  /cis/agents/{id}/score:
    get:
      tags: [CIS]
      summary: CIS score (0–100) for an agent
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Score }

  /cis/agents/{id}/scan:
    post:
      tags: [CIS]
      summary: Trigger an on-demand CIS scan for an agent
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Scan queued }

