      summary: Deploy a profile to all enrolled devices
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Deployment queued }

  # ── Network Behavior Analytics ───────────────────────────────────────────────

  /nba/anomalies:
    get:
      tags: [NBA]
