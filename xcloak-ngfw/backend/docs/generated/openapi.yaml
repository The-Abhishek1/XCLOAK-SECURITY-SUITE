      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CorrelationRule" }
      responses:
        "200": { description: Created }

  /correlation/rules/{id}:
    put:
      tags: [Correlation]
      summary: Update a correlation rule
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CorrelationRule" }
      responses:
        "200": { description: Updated }
    delete:
      tags: [Correlation]
      summary: Delete a correlation rule
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Deleted }

  /correlation/rules/{id}/toggle:
    patch:
      tags: [Correlation]
      summary: Enable or disable a correlation rule
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Toggled }

  /correlation/matches:
    get:
      tags: [Correlation]
      summary: List correlation match events
      responses:
        "200": { description: Match list }

  # ── Custom Roles ─────────────────────────────────────────────────────────────

  /custom-roles:
