        "200": { description: Created }

  /custom-roles/{id}:
    put:
      tags: [CustomRoles]
      summary: Update a custom role
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:        { type: string }
                permissions: { type: array, items: { type: string } }
      responses:
        "200": { description: Updated }
    delete:
      tags: [CustomRoles]
      summary: Delete a custom role
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Deleted }

  /permissions:
    get:
      tags: [CustomRoles]
      summary: List all available permission strings
      responses:
        "200": { description: Permission list }

  # ── DFIR ─────────────────────────────────────────────────────────────────────

  /dfir/collections:
    get:
