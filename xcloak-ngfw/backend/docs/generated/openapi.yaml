    get:
      tags: [Canary]
      summary: List all canary trip events
      responses:
        "200": { description: Trip event list }

  /canary/trip/{value}:
    get:
      tags: [Canary]
      summary: Get trip detail for a specific token value
      parameters:
        - { name: value, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Trip detail }

  # ── Cases ────────────────────────────────────────────────────────────────────

  /cases:
    get:
      tags: [Cases]
      summary: List cases
      responses:
        "200":
          description: Case list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Case" }
    post:
      tags: [Cases]
      summary: Create a case
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, severity]
              properties:
                title:    { type: string }
                severity: { type: string, enum: [low, medium, high, critical] }
      responses:
        "200": { description: Case created }

  /cases/{id}:
    get:
      tags: [Cases]
      summary: Get case detail
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Case
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Case" }
    put:
      tags: [Cases]
      summary: Update case
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Case" }
      responses:
        "200": { description: Updated }
    delete:
      tags: [Cases]
      summary: Delete case
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Deleted }

  /cases/{id}/alerts:
    post:
      tags: [Cases]
      summary: Link an alert to a case
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [alert_id]
              properties:
                alert_id: { type: integer }
      responses:
        "200": { description: Alert linked }

  /cases/{id}/alerts/{alert_id}:
    delete:
      tags: [Cases]
      summary: Unlink an alert from a case
      parameters:
        - { name: id,       in: path, required: true, schema: { type: integer } }
        - { name: alert_id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Unlinked }

  /cases/{id}/comments:
    post:
      tags: [Cases]
      summary: Add a comment to a case
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string }
      responses:
        "200": { description: Comment added }

  /cases/{id}/evidence:
    post:
      tags: [Cases]
      summary: Attach evidence (file upload) to a case
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:        { type: string, format: binary }
                description: { type: string }
      responses:
        "200": { description: Evidence attached }

