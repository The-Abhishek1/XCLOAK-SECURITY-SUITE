  # ── Users ────────────────────────────────────────────────────────────────────

  /users:
    get:
      tags: [Users]
      summary: List users in the tenant
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/User" }

  /users/invite:
    post:
      tags: [Users]
      summary: Invite a user (sends email with set-password link)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, role]
              properties:
                username: { type: string }
                email:    { type: string, format: email }
                role:     { type: string, enum: [admin, analyst, viewer] }
      responses:
        "200":
          description: Invite sent

  /users/{id}/role:
    put:
      tags: [Users]
      summary: Update a user's role
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { type: string }
      responses:
        "200":
          description: Role updated

  /users/{id}/toggle:
    patch:
      tags: [Users]
      summary: Enable or disable a user account
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Toggled

  # ── Platform Admin ───────────────────────────────────────────────────────────

  /platform/tenants:
    get:
      tags: [Platform]
      summary: List all tenants (platform admin only)
      responses:
        "200":
          description: Tenant list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Tenant" }
    post:
      tags: [Platform]
      summary: Create a tenant and invite its first admin via email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, slug, admin_username, admin_email]
              properties:
                name:           { type: string }
                slug:           { type: string }
                admin_username: { type: string }
                admin_email:    { type: string, format: email }
      responses:
        "200":
          description: Tenant created

  /platform/tenants/{id}/toggle:
    patch:
      tags: [Platform]
      summary: Suspend or reactivate a tenant
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Toggled

  # ── Logs ─────────────────────────────────────────────────────────────────────

  /logs/search:
    get:
      tags: [Logs]
      summary: Full-text search across ingested logs
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: agent_id
          in: query
          schema: { type: integer }
        - name: severity
          in: query
          schema: { type: string }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          schema: { type: integer, default: 100 }
      responses:
        "200":
          description: Matching log entries

  /logs/stats:
    get:
      tags: [Logs]
      summary: Log volume and severity distribution stats
      responses:
        "200":
          description: Log statistics

  /logs/retention:
    get:
      tags: [Logs]
      summary: Get current retention policy
      responses:
        "200":
          description: Retention policy
    put:
      tags: [Logs]
      summary: Set retention policy (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [days]
              properties:
                days: { type: integer, minimum: 1, maximum: 365 }
      responses:
        "200":
          description: Policy updated

  # ── Dashboard ────────────────────────────────────────────────────────────────

  /dashboard/overview:
    get:
      tags: [Dashboard]
      summary: Dashboard overview metrics
      responses:
        "200":
          description: |
            Returns counts of open alerts, active incidents, online agents,
            recent sigma detections, and top threat actors.

  /health:
    get:
      tags: [Dashboard]
      summary: Liveness check
      security: []
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }

  # ── Auth extensions ─────────────────────────────────────────────────────────

  /auth/2fa/status:
    get:
      tags: [Auth]
      summary: Get 2FA enabled/disabled status for the current user
      responses:
        "200": { description: 2FA status }

  /auth/2fa/setup:
    post:
      tags: [Auth]
      summary: Generate a TOTP secret and QR URI (first step of 2FA enroll)
      responses:
        "200":
          description: QR URI and backup codes
          content:
            application/json:
              schema:
                type: object
                properties:
                  otp_uri:      { type: string }
                  backup_codes: { type: array, items: { type: string } }

  /auth/2fa/verify:
    post:
      tags: [Auth]
      summary: Confirm TOTP code to activate 2FA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string, minLength: 6, maxLength: 6 }
      responses:
        "200": { description: 2FA activated }
        "400": { description: Invalid code }

  /auth/2fa:
    delete:
      tags: [Auth]
      summary: Disable 2FA for the current user (requires password confirmation)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password: { type: string }
      responses:
        "200": { description: 2FA disabled }

  /auth/sessions:
    get:
      tags: [Sessions]
      summary: List active sessions for the current user
      responses:
        "200": { description: Session list }

  /auth/oidc/exchange:
    post:
      tags: [Auth]
      summary: Exchange PKCE code for tokens (SPA OIDC flow)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, state, code_verifier]
              properties:
                code:           { type: string }
                state:          { type: string }
                code_verifier:  { type: string }
      responses:
        "200": { description: Tokens exchanged — auth cookies set }

  /ws/ticket:
    post:
      tags: [Dashboard]
      summary: Issue a short-lived WebSocket ticket for /notifications/stream
      responses:
        "200":
          description: WS ticket
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticket: { type: string }

  # ── API Keys ─────────────────────────────────────────────────────────────────

  /api-keys:
    get:
      tags: [ApiKeys]
      summary: List API keys for the current user
      responses:
        "200":
          description: API key list (key values never returned after creation)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ApiKey" }
    post:
      tags: [ApiKeys]
      summary: Create a new API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        "200":
          description: Created — full key returned once, store it
          content:
            application/json:
              schema:
                type: object
                properties:
                  key:  { type: string }
                  name: { type: string }

  /api-keys/{id}:
    delete:
      tags: [ApiKeys]
      summary: Revoke an API key
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Revoked }

