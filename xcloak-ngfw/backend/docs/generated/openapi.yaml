        "200": { description: Alert list }

  /clusters/analyze:
    post:
      tags: [Clusters]
      summary: Run clustering analysis on recent alerts
      responses:
        "200": { description: Analysis complete }

  /clusters/{id}/suppress:
    post:
      tags: [Clusters]
      summary: Suppress all alerts in a cluster
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Suppressed }

  # ── Compliance ───────────────────────────────────────────────────────────────

  /compliance/reports:
    get:
      tags: [Compliance]
      summary: List compliance reports
      responses:
        "200":
          description: Report list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ComplianceReport" }
