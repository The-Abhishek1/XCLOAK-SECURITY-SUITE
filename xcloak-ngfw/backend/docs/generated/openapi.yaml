      responses:
        "200": { description: Collection list }
    post:
      tags: [DFIR]
      summary: Trigger forensic collection on an agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agent_id]
              properties:
                agent_id: { type: integer }
                targets:  { type: array, items: { type: string } }
      responses:
        "200": { description: Collection queued }

  /dfir/collections/{id}/artifacts:
    get:
      tags: [DFIR]
      summary: List artifacts in a collection
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Artifact list }

  /dfir/incidents/{incident_id}/timeline:
    get:
      tags: [DFIR]
      summary: Event timeline for an incident (DFIR view)
      parameters:
        - { name: incident_id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Timeline entries }

  # ── Enrichment ───────────────────────────────────────────────────────────────

  /enrich/hash/{hash}:
    get:
      tags: [Enrichment]
      summary: Enrich a file hash via VirusTotal / local threat intel
      parameters:
        - { name: hash, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Enrichment result }

  /geoip/{ip}:
    get:
      tags: [Enrichment]
      summary: GeoIP lookup for an IP address
      parameters:
        - { name: ip, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: GeoIP data }

  /cve/{id}:
    get:
      tags: [Enrichment]
      summary: CVE detail from local NVD mirror or online lookup
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, example: CVE-2023-44487 } }
      responses:
        "200": { description: CVE detail }

  /mitre/mappings:
    get:
      tags: [Enrichment]
      summary: MITRE ATT&CK tactic→technique mappings used by active rules
      responses:
        "200": { description: Mapping list }

  /attack-path:
    get:
      tags: [Enrichment]
      summary: Inferred attack path graph from recent correlated events
      responses:
        "200": { description: Attack path graph (nodes + edges) }

  # ── Honeyports ───────────────────────────────────────────────────────────────

  /honeyports:
    get:
      tags: [Honeyports]
      summary: List configured honeyport listeners
      responses:
        "200": { description: Honeyport list }
    post:
      tags: [Honeyports]
      summary: Add a honeyport listener
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [port, protocol]
              properties:
                port:        { type: integer }
                protocol:    { type: string, enum: [tcp, udp] }
                description: { type: string }
      responses:
        "200": { description: Created }

  /honeyports/{id}:
    delete:
      tags: [Honeyports]
      summary: Remove a honeyport listener
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Deleted }

  # ── Hunt ─────────────────────────────────────────────────────────────────────

  /hunt/templates:
    get:
      tags: [Hunt]
      summary: List hunt query templates
      responses:
        "200": { description: Template list }
    post:
      tags: [Hunt]
      summary: Create a hunt template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, query]
              properties:
                name:        { type: string }
                query:       { type: string }
                description: { type: string }
      responses:
        "200": { description: Template created }

  /hunt/templates/{id}:
    delete:
      tags: [Hunt]
      summary: Delete a hunt template
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Deleted }

  /hunt/queries:
    get:
      tags: [Hunt]
      summary: List saved hunt queries (alias for templates used in UI)
      responses:
        "200": { description: Query list }

  /hunt/run:
    get:
      tags: [Hunt]
      summary: List hunt runs for the tenant
      responses:
        "200": { description: Run list }
    post:
      tags: [Hunt]
      summary: Execute a hunt query
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:    { type: string }
                agent_ids: { type: array, items: { type: integer } }
      responses:
        "200": { description: Run started }

  /hunt/runs:
    get:
      tags: [Hunt]
      summary: List all hunt run results
      responses:
        "200": { description: Run list }

  /hunt/runs/{id}:
    get:
      tags: [Hunt]
      summary: Get a specific hunt run with results
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Run detail }

  /hunt/runs/{id}/notes:
    patch:
      tags: [Hunt]
      summary: Add analyst notes to a hunt run
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [notes]
              properties:
                notes: { type: string }
      responses:
        "200": { description: Notes saved }

  /hunt/execute:
    post:
      tags: [Hunt]
      summary: One-shot hunt execute (no template — ad-hoc query)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query: { type: string }
      responses:
        "200": { description: Results }

  # ── Identity ─────────────────────────────────────────────────────────────────

  /identity:
    get:
      tags: [ITDR]
      summary: Identity risk overview (AD / LDAP account anomalies)
      responses:
        "200": { description: Identity risk summary }

  # ── ITDR ─────────────────────────────────────────────────────────────────────

  /itdr/summary:
    get:
      tags: [ITDR]
      summary: ITDR finding summary
      responses:
        "200": { description: Summary }

  /itdr/findings:
    get:
      tags: [ITDR]
      summary: List ITDR findings (anomalous identity actions)
      responses:
        "200": { description: Finding list }

  /itdr/findings/{id}:
    get:
      tags: [ITDR]
      summary: Get ITDR finding detail
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Finding }

  /itdr/findings/{id}/status:
    patch:
      tags: [ITDR]
      summary: Update ITDR finding status (acknowledge, false-positive, etc.)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [open, acknowledged, false_positive, resolved] }
      responses:
        "200": { description: Status updated }

  # ── Insider Threat ────────────────────────────────────────────────────────────

  /insider-threat:
    get:
      tags: [InsiderThreat]
      summary: List insider threat user risk scores
      responses:
        "200": { description: Risk list }

  /insider-threat/summary:
    get:
      tags: [InsiderThreat]
      summary: Tenant-wide insider threat summary
      responses:
        "200": { description: Summary }

  # ── Integrations ─────────────────────────────────────────────────────────────

  /integrations:
    get:
      tags: [Integrations]
      summary: List configured integrations (Slack, PagerDuty, Jira, etc.)
      responses:
        "200": { description: Integration list }

  /integrations/{name}:
    put:
      tags: [Integrations]
      summary: Create or update an integration configuration
      parameters:
        - { name: name, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Integration-specific configuration (varies by name)
      responses:
        "200": { description: Saved }

  /integrations/{name}/test:
    post:
      tags: [Integrations]
      summary: Send a test notification to an integration
      parameters:
        - { name: name, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Test sent }

  /integrations/deliveries:
    get:
      tags: [Integrations]
      summary: List recent webhook delivery attempts
      responses:
        "200": { description: Delivery list }

  /integrations/install-tokens:
    get:
      tags: [Integrations]
      summary: List agent install tokens
      responses:
        "200": { description: Token list }
    post:
      tags: [Integrations]
      summary: Generate a new agent install token
      responses:
        "200": { description: Token }

  # ── JA3 Fingerprints ─────────────────────────────────────────────────────────

  /ja3/fingerprints:
    get:
      tags: [JA3]
      summary: List JA3/JA3S TLS fingerprints
      responses:
        "200": { description: Fingerprint list }
    post:
      tags: [JA3]
      summary: Submit a JA3 fingerprint for classification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ja3, ja3s]
              properties:
                ja3:    { type: string }
                ja3s:   { type: string }
                label:  { type: string, enum: [benign, malicious, unknown] }
      responses:
        "200": { description: Classified }

  /ja3/fingerprints/{id}:
    delete:
      tags: [JA3]
      summary: Delete a JA3 fingerprint entry
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Deleted }

  # ── Log Sources ───────────────────────────────────────────────────────────────

  /log-sources:
    get:
      tags: [LogSources]
      summary: List agentless log sources
      responses:
        "200":
          description: Log source list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/LogSource" }
    post:
      tags: [LogSources]
      summary: Add a log source
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LogSource" }
      responses:
        "200": { description: Created }

  /log-sources/{id}:
    put:
      tags: [LogSources]
      summary: Update a log source
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LogSource" }
      responses:
        "200": { description: Updated }
    delete:
      tags: [LogSources]
      summary: Delete a log source
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Deleted }

  /logs/searches:
    get:
      tags: [Logs]
      summary: List saved log searches
      responses:
        "200": { description: Saved search list }
    post:
      tags: [Logs]
      summary: Save a log search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, query]
              properties:
                name:  { type: string }
                query: { type: string }
      responses:
        "200": { description: Saved }

  /logs/searches/{id}/run:
    post:
      tags: [Logs]
      summary: Execute a saved log search
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Search results }

  /logs/searches/{id}:
    delete:
      tags: [Logs]
      summary: Delete a saved log search
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Deleted }

  /logs/export:
    get:
      tags: [Logs]
      summary: Export logs as NDJSON
      parameters:
        - { name: agent_id, in: query, schema: { type: integer } }
        - { name: from,     in: query, schema: { type: string, format: date-time } }
        - { name: to,       in: query, schema: { type: string, format: date-time } }
      responses:
        "200":
          description: NDJSON log export
          content:
            application/x-ndjson:
              schema: { type: string }

  /ingest:
    post:
      tags: [LogSources]
      summary: Ingest raw log events from external sources (agentless push)
      security:
        - agentKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                events:
                  type: array
                  items: { type: object }
      responses:
        "200": { description: Events ingested }

  # ── MDM ───────────────────────────────────────────────────────────────────────

  /mdm/devices:
    get:
      tags: [MDM]
      summary: List enrolled MDM devices
      responses:
        "200":
          description: Device list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MDMDevice" }
    post:
      tags: [MDM]
      summary: Manually enroll a device
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MDMDevice" }
      responses:
        "200": { description: Enrolled }

  /mdm/self-enroll:
    post:
      tags: [MDM]
      summary: Self-enrollment endpoint used by mobile agent at first launch
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enrollment_token, device_id, platform]
              properties:
                enrollment_token: { type: string }
                device_id:        { type: string }
                platform:         { type: string, enum: [android, ios] }
                hostname:         { type: string }
      responses:
        "200":
          description: Enrolled — returns agent API key
          content:
            application/json:
              schema:
                type: object
                properties:
                  device_id: { type: integer }
                  api_key:   { type: string }

  /mdm/devices/{id}:
    get:
      tags: [MDM]
      summary: Get MDM device detail
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Device }
    delete:
      tags: [MDM]
      summary: Unenroll a device
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Unenrolled }

  /mdm/devices/{id}/checkin:
    put:
      tags: [MDM]
      summary: Device check-in (posture data from mobile agent)
      security:
        - agentKey: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                posture:    { type: object }
                app_list:   { type: array, items: { type: object } }
                os_version: { type: string }
      responses:
        "200": { description: Check-in recorded }

  /mdm/devices/{id}/commands:
    get:
      tags: [MDM]
      summary: List commands issued to a device
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Command list }
    post:
      tags: [MDM]
      summary: Issue an MDM command to a device
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [command]
              properties:
                command: { type: string, enum: [lock, wipe, locate, restart, enable_wifi, disable_wifi] }
                payload: { type: object }
      responses:
        "200": { description: Command queued }

  /mdm/devices/{id}/commands/pending:
    get:
      tags: [MDM]
      summary: Pending commands for a device (polled by agent)
      security:
        - agentKey: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Pending commands }

  /mdm/commands/{id}/acknowledge:
    post:
      tags: [MDM]
      summary: Agent acknowledges command execution
      security:
        - agentKey: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                result: { type: string }
                error:  { type: string }
      responses:
        "200": { description: Acknowledged }

  /mdm/devices/{id}/compliance:
    get:
      tags: [MDM]
      summary: Compliance posture for a device
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Compliance detail }

  /mdm/devices/{id}/block:
    post:
      tags: [MDM]
      summary: Block a device (prevent check-in)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Blocked }

  /mdm/devices/{id}/unblock:
    post:
      tags: [MDM]
      summary: Unblock a previously blocked device
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Unblocked }

  /mdm/devices/{id}/apps:
    post:
      tags: [MDM]
      summary: Submit app inventory from mobile agent
      security:
        - agentKey: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                apps: { type: array, items: { type: object } }
      responses:
        "200": { description: Inventory recorded }

  /mdm/compliance/summary:
    get:
      tags: [MDM]
      summary: Aggregate MDM compliance summary across all devices
      responses:
        "200": { description: Summary }

  /mdm/compliance/run:
    post:
      tags: [MDM]
      summary: Re-evaluate compliance for all enrolled devices
      responses:
        "200": { description: Evaluation queued }

  /mdm/enrollment-tokens:
    get:
      tags: [MDM]
      summary: List enrollment tokens
      responses:
