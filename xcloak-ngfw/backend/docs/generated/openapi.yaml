      responses:
        "200": { description: Anomaly list }

  /nba/anomalies/{id}/acknowledge:
    post:
      tags: [NBA]
      summary: Acknowledge an NBA anomaly
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Acknowledged }

  /nba/baseline/{agent_id}:
    get:
      tags: [NBA]
      summary: Get network behavior baseline for an agent
      parameters:
        - { name: agent_id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Baseline }

  /nba/analyze:
    post:
      tags: [NBA]
      summary: Run NBA analysis on recent network events
      responses:
        "200": { description: Analysis complete }

  # ── Network Map ───────────────────────────────────────────────────────────────

  /network-map:
    get:
      tags: [NetworkMap]
      summary: Live network topology graph
      responses:
        "200": { description: Nodes and edges }

  /network-map/ip-info:
    get:
      tags: [NetworkMap]
      summary: IP enrichment details for a selected node
      parameters:
        - { name: ip, in: query, required: true, schema: { type: string } }
      responses:
        "200": { description: IP info }

  /network-map/port-info:
    get:
      tags: [NetworkMap]
      summary: Port/service info for a selected connection
      parameters:
        - { name: port, in: query, required: true, schema: { type: integer } }
      responses:
        "200": { description: Port info }

  # ── Notifications ─────────────────────────────────────────────────────────────

  /notifications/email:
    get:
      tags: [Notifications]
      summary: List email notification channels
      responses:
        "200": { description: Channel list }
    post:
      tags: [Notifications]
      summary: Create an email notification channel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, events]
              properties:
                email:  { type: string, format: email }
                events: { type: array, items: { type: string } }
      responses:
        "200": { description: Created }

  /notifications/email/{id}:
    delete:
      tags: [Notifications]
      summary: Delete a notification channel
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Deleted }

  /notifications/email/{id}/toggle:
    patch:
      tags: [Notifications]
      summary: Enable or disable a notification channel
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Toggled }

  # ── Playbooks ─────────────────────────────────────────────────────────────────

  /playbooks:
    get:
      tags: [Playbooks]
      summary: List automated response playbooks
      responses:
        "200":
          description: Playbook list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Playbook" }
    post:
      tags: [Playbooks]
      summary: Create a playbook
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Playbook" }
      responses:
        "200": { description: Created }

  /playbooks/{id}:
    put:
      tags: [Playbooks]
      summary: Update a playbook
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Playbook" }
      responses:
        "200": { description: Updated }
    delete:
      tags: [Playbooks]
      summary: Delete a playbook
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Deleted }

  /playbooks/{id}/actions:
    get:
      tags: [Playbooks]
      summary: List actions in a playbook
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Action list }

  /playbooks/{id}/enable:
    patch:
      tags: [Playbooks]
      summary: Enable a playbook
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Enabled }

  /playbooks/{id}/disable:
    patch:
      tags: [Playbooks]
      summary: Disable a playbook
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Disabled }

  /playbook-actions:
    post:
      tags: [Playbooks]
      summary: Create a playbook action
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [playbook_id, action_type]
              properties:
                playbook_id:  { type: integer }
                action_type:  { type: string }
                parameters:   { type: object }
                order:        { type: integer }
      responses:
        "200": { description: Created }

  /playbook-actions/{id}:
    delete:
      tags: [Playbooks]
      summary: Delete a playbook action
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Deleted }

  /playbook-executions:
    get:
      tags: [Playbooks]
      summary: List playbook executions
      responses:
        "200": { description: Execution list }

  /playbook-executions/{id}/steps:
    get:
      tags: [Playbooks]
      summary: Get step-by-step execution results
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Step results }

  # ── Quarantine ────────────────────────────────────────────────────────────────

  /quarantine:
    get:
      tags: [Quarantine]
      summary: List quarantined endpoints
      responses:
        "200": { description: Quarantine list }
    post:
      tags: [Quarantine]
      summary: Quarantine an endpoint (isolate from network)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agent_id, reason]
              properties:
                agent_id: { type: integer }
                reason:   { type: string }
      responses:
        "200": { description: Quarantine action dispatched }

  /quarantine/stats:
    get:
      tags: [Quarantine]
      summary: Quarantine statistics
      responses:
        "200": { description: Stats }

  /quarantine/{id}:
    delete:
      tags: [Quarantine]
      summary: Release an endpoint from quarantine
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Released }

  # ── Risk Posture ──────────────────────────────────────────────────────────────

  /risk-posture:
    get:
      tags: [RiskPosture]
      summary: Current tenant-wide risk posture score (0–100)
      responses:
        "200": { description: Risk posture }

  /risk-posture/history:
    get:
      tags: [RiskPosture]
      summary: Historical risk posture score series
      parameters:
        - { name: days, in: query, schema: { type: integer, default: 30 } }
      responses:
        "200": { description: Score history }

  /risk-posture/refresh:
    post:
      tags: [RiskPosture]
      summary: Trigger an on-demand risk posture recalculation
      responses:
        "200": { description: Refresh queued }

  # ── Scheduled Reports ─────────────────────────────────────────────────────────

  /scheduled-reports:
    get:
      tags: [ScheduledReports]
      summary: List scheduled reports
      responses:
        "200": { description: Report schedule list }
    post:
      tags: [ScheduledReports]
      summary: Create a scheduled report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, report_type, cron, recipients]
              properties:
                name:        { type: string }
                report_type: { type: string, enum: [executive, compliance, alert_summary] }
                cron:        { type: string, example: "0 8 * * 1" }
                recipients:  { type: array, items: { type: string, format: email } }
      responses:
        "200": { description: Created }

  /scheduled-reports/{id}:
    put:
      tags: [ScheduledReports]
      summary: Update a scheduled report
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: Updated }
    delete:
      tags: [ScheduledReports]
      summary: Delete a scheduled report
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Deleted }

  # ── Scheduler ─────────────────────────────────────────────────────────────────

  /scheduler/tasks:
    get:
      tags: [Scheduler]
      summary: List background scheduler tasks
      responses:
        "200": { description: Task list }
    post:
      tags: [Scheduler]
      summary: Create a scheduler task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, task_type]
              properties:
                name:      { type: string }
                task_type: { type: string }
                cron:      { type: string }
                payload:   { type: object }
      responses:
        "200": { description: Created }

  /scheduler/tasks/{id}/run:
    post:
      tags: [Scheduler]
      summary: Trigger an immediate run of a scheduled task
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Run triggered }

  /scheduler/tasks/{id}:
    delete:
      tags: [Scheduler]
      summary: Delete a scheduler task
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Deleted }

  /scheduler/tasks/{id}/toggle:
    patch:
      tags: [Scheduler]
      summary: Enable or disable a scheduler task
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Toggled }

  # ── Scripts ───────────────────────────────────────────────────────────────────

  /scripts/templates:
    get:
      tags: [Scripts]
      summary: List available script templates
      responses:
        "200": { description: Template list }

  /scripts/run:
    post:
      tags: [Scripts]
      summary: Run a script on one or more agents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agent_ids, script]
              properties:
                agent_ids: { type: array, items: { type: integer } }
                script:    { type: string }
                timeout:   { type: integer, description: Seconds }
      responses:
        "200":
          description: Task IDs to poll for results
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_ids: { type: array, items: { type: string } }

  /scripts/result/{task_id}:
    get:
      tags: [Scripts]
      summary: Poll script execution result
      parameters:
        - { name: task_id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Result or pending status }

  /scripts/history:
    get:
      tags: [Scripts]
      summary: Script execution history
      responses:
        "200": { description: History list }

  # ── Security Policy ───────────────────────────────────────────────────────────

  /security-policy:
    get:
      tags: [Users]
      summary: Get tenant security policy (password, MFA, session settings)
      responses:
        "200": { description: Security policy }
    put:
      tags: [Users]
      summary: Update tenant security policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password_min_length:  { type: integer }
                require_mfa:          { type: boolean }
                session_timeout_mins: { type: integer }
                allowed_ip_ranges:    { type: array, items: { type: string } }
      responses:
        "200": { description: Policy updated }

  /settings/ioc-sharing:
    patch:
      tags: [IOC]
      summary: Update IOC sharing settings (enable/disable cross-tenant sharing)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled: { type: boolean }
      responses:
        "200": { description: Updated }

  # ── Suppression ───────────────────────────────────────────────────────────────

  /suppression/rules:
    get:
      tags: [Suppression]
      summary: List alert suppression rules
      responses:
        "200": { description: Suppression rule list }
    post:
      tags: [Suppression]
      summary: Create a suppression rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, match_type, match_value]
              properties:
                name:        { type: string }
                match_type:  { type: string, enum: [title, source, agent_id, sigma_rule_id] }
                match_value: { type: string }
                expires_at:  { type: string, format: date-time }
      responses:
        "200": { description: Created }

  /suppression/rules/{id}:
    delete:
      tags: [Suppression]
      summary: Delete a suppression rule
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Deleted }

  /suppression/rules/{id}/toggle:
    patch:
      tags: [Suppression]
      summary: Enable or disable a suppression rule
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Toggled }

  # ── Tasks (agent task queue) ──────────────────────────────────────────────────

  /tasks:
    post:
      tags: [Tasks]
      summary: Queue a task for an agent (requires approval if policy set)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agent_id, task_type]
              properties:
                agent_id:  { type: integer }
                task_type: { type: string }
                payload:   { type: object }
      responses:
        "200": { description: Task queued }

  /tasks/agent/{id}:
    get:
      tags: [Tasks]
      summary: Get pending tasks for an agent (polled by agent)
      security:
        - agentKey: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Pending tasks }

  /tasks/pending-approval:
    get:
      tags: [Tasks]
      summary: Tasks awaiting admin approval
      responses:
        "200": { description: Pending approval list }

  /tasks/{id}/approve:
    post:
      tags: [Tasks]
      summary: Approve a pending task
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Approved }

  /tasks/{id}/reject:
    post:
      tags: [Tasks]
      summary: Reject a pending task
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Rejected }

  /tasks/result:
    post:
      tags: [Tasks]
      summary: Agent posts task execution result
      security:
        - agentKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [task_id, output, exit_code]
              properties:
                task_id:   { type: string }
                output:    { type: string }
                exit_code: { type: integer }
      responses:
        "200": { description: Result recorded }

  # ── Threat Actors ─────────────────────────────────────────────────────────────

  /threat-actors:
    get:
      tags: [ThreatActors]
      summary: List known threat actors
      responses:
        "200":
          description: Threat actor list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ThreatActor" }
    post:
      tags: [ThreatActors]
      summary: Create a threat actor profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ThreatActor" }
      responses:
        "200": { description: Created }

  /threat-actors/{id}/alerts:
    get:
      tags: [ThreatActors]
      summary: Alerts attributed to a threat actor
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Alert list }

  /threat-actors/{id}:
    delete:
      tags: [ThreatActors]
      summary: Delete a threat actor profile
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Deleted }

  # ── Threat Feeds ──────────────────────────────────────────────────────────────

  /threat-feeds:
    get:
      tags: [ThreatFeeds]
      summary: List configured threat intelligence feeds
      responses:
        "200":
          description: Feed list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ThreatFeed" }
    post:
      tags: [ThreatFeeds]
      summary: Add a threat feed
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ThreatFeed" }
      responses:
        "200": { description: Created }

  /threat-feeds/{id}:
    put:
      tags: [ThreatFeeds]
      summary: Update a threat feed
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ThreatFeed" }
      responses:
        "200": { description: Updated }
    delete:
      tags: [ThreatFeeds]
      summary: Delete a threat feed
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Deleted }

  /threat-feeds/{id}/sync:
    post:
      tags: [ThreatFeeds]
      summary: Trigger immediate sync of a threat feed
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Sync started }

  /threat-feeds/{id}/sync-log:
    get:
      tags: [ThreatFeeds]
      summary: Sync history log for a threat feed
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Sync log }

  # ── Threat Scores ─────────────────────────────────────────────────────────────

  /threat/scores:
    get:
      tags: [ThreatScores]
      summary: Per-agent threat scores
      responses:
        "200": { description: Score list }

  /threat/fleet:
    get:
      tags: [ThreatScores]
      summary: Fleet-wide threat score summary
      responses:
        "200": { description: Fleet summary }

  /threat/baselines:
    get:
      tags: [ThreatScores]
      summary: Behavioral baselines used for scoring
      responses:
        "200": { description: Baseline list }

  /threat/score/{agent_id}:
    post:
      tags: [ThreatScores]
      summary: Trigger threat score recalculation for an agent
      parameters:
        - { name: agent_id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Score updated }

  /threat/findings/{id}/acknowledge:
    post:
      tags: [ThreatScores]
      summary: Acknowledge a threat finding
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Acknowledged }

  # ── UEBA ─────────────────────────────────────────────────────────────────────

  /ueba/users:
    get:
      tags: [UEBA]
      summary: List user risk profiles from UEBA
      responses:
        "200": { description: User risk list }

  /ueba/events:
    get:
      tags: [UEBA]
      summary: List UEBA anomalous events
      parameters:
        - { name: user_id, in: query, schema: { type: integer } }
        - { name: from,    in: query, schema: { type: string, format: date-time } }
        - { name: to,      in: query, schema: { type: string, format: date-time } }
      responses:
        "200": { description: Event list }

  /ueba/analyze:
    post:
      tags: [UEBA]
      summary: Run UEBA analysis on recent user events
      responses:
        "200": { description: Analysis complete }

  # ── Vulnerabilities ───────────────────────────────────────────────────────────

  /vulns/priority-queue:
    get:
      tags: [Vulnerabilities]
      summary: Prioritized vulnerability queue (CVSS + EPSS + asset criticality)
      responses:
        "200":
          description: Priority-sorted vuln list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/VulnPriority" }

  /vulns/imports:
    get:
      tags: [Vulnerabilities]
      summary: List vulnerability scan imports
      responses:
        "200": { description: Import list }

  /vulns/import:
    post:
      tags: [Vulnerabilities]
      summary: Import vulnerability scan results (Nessus, Qualys, OpenVAS)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, format]
              properties:
                file:   { type: string, format: binary }
                format: { type: string, enum: [nessus, qualys, openvas, csv] }
      responses:
        "200": { description: Import queued }

  /vulns/refresh-priorities:
    post:
      tags: [Vulnerabilities]
      summary: Re-score all vulns with latest EPSS data
      responses:
        "200": { description: Refresh queued }

  /vulns/{id}/patch-status:
    patch:
      tags: [Vulnerabilities]
      summary: Update patch status for a vulnerability
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [patch_status]
              properties:
                patch_status: { type: string, enum: [unpatched, patched, ignored, in_progress] }
      responses:
        "200": { description: Status updated }

  # ── AI ────────────────────────────────────────────────────────────────────────

  /ai/chat:
    post:
      tags: [AI]
      summary: Chat with the XCloak AI assistant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:     { type: string }
                context_ids: { type: array, items: { type: integer }, description: Alert IDs to include as context }
      responses:
        "200":
