              type: object
              required: [name, type]
              properties:
                name: { type: string }
                type: { type: string, enum: [dns, http, file, aws] }
      responses:
        "200": { description: Token created }

  /canary/tokens/{id}:
    delete:
      tags: [Canary]
      summary: Delete a canary token
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Deleted }

  /canary/tokens/{id}/toggle:
    patch:
      tags: [Canary]
      summary: Enable or disable a canary token
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Toggled }

