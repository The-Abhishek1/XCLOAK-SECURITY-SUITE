        "200": { description: Created }

  /mdm/profiles:
    get:
      tags: [MDM]
      summary: List MDM configuration profiles
      responses:
        "200": { description: Profile list }
    post:
      tags: [MDM]
      summary: Create a configuration profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
