      tags: [Compliance]
      summary: Generate a new compliance report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [framework]
              properties:
                framework: { type: string, enum: [soc2, iso27001, hipaa, pci_dss, nist_csf, cis] }
      responses:
        "200": { description: Report generation started }

  /compliance/reports/{id}:
    get:
      tags: [Compliance]
      summary: Get a compliance report
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Report }
    delete:
      tags: [Compliance]
      summary: Delete a compliance report
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Deleted }

  /compliance/reports/{id}/pdf:
    get:
      tags: [Compliance]
      summary: Download compliance report as PDF
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: PDF binary
          content:
            application/pdf:
              schema: { type: string, format: binary }

  /compliance/reports/{id}/scores:
    get:
      tags: [Compliance]
      summary: Per-control scores within a report
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: Control scores }

  /framework-compliance:
    get:
      tags: [Compliance]
      summary: Overview of all framework compliance statuses
      responses:
        "200": { description: Framework compliance map }

  /framework-compliance/{framework}:
    get:
      tags: [Compliance]
      summary: Detailed compliance for a single framework
      parameters:
        - { name: framework, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Framework detail }

  # ── Correlation ───────────────────────────────────────────────────────────────

